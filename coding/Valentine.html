<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Valentine</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffebee; /* Light pink background */
            font-family: 'Arial', sans-serif;
            flex-direction: column;
            overflow: hidden; /* Prevents scrolling */
            margin: 0;
        }

        h1 {
            color: #d32f2f;
            font-size: 2.5rem;
            margin: 20px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* The Image Styling */
        .gif-container img {
            width: 300px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            object-fit: cover;
        }

        /* Button Container */
        .btn-container {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* General Button Styles */
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        /* Yes Button */
        #yesBtn {
            background-color: #4caf50;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        #yesBtn:hover {
            transform: scale(1.05);
            background-color: #45a049;
        }

        /* No Button */
        #noBtn {
            background-color: #f44336;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            position: relative; /* Needed for movement */
        }

        /* Hidden Audio Player */
        audio {
            display: none;
        }
    </style>
</head>
<body>

    <div class="gif-container">
        <img id="imageDisplay" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpwa3p6eHh6eHh6eHh6eHh6eHh6eHh6eHh6eHh6eHh6eHh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3ohzdIuqJoo8QdK2CQ/giphy.gif" alt="Cute cat">
    </div>

    <h1 id="questionText">Will you be my Valentine? 🌹</h1>

    <div class="btn-container">
        <button id="yesBtn" onclick="acceptLove()">Yes</button>
        <button id="noBtn" onmouseover="moveNo()" onclick="rejectLove()">No</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="ok.mpeg" type="audio/mpeg">
    </audio>

    <script>
        let noClickCount = 0;
        let yesScale = 1;
        
        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");
        const image = document.getElementById("imageDisplay");
        const question = document.getElementById("questionText");
        const audio = document.getElementById("bgMusic");

        const noTexts = ["No", "Are you sure?", "Pakka?", "Firse Sochle!", "Last chance!", "yes kr de na!", "You're breaking my heart!", "kr de na koko....", "dekh fir head pain aur stomach ache krega to mai nhi dbaunga", "fine... NO", "kr de na shemde...",
             "vroom vroom?", "accha bhushan bhaiya ki gaadi..","laila?", "mt sta behen", "saurabh k sath chla jaunga", "accha rakhi hi bandh lena!", "ab to maan hi jayegi", "nahi???", " ruk ja baccha ab tu"
        ];

        // Function when she clicks NO
        function rejectLove() {
            noClickCount++;
            
            // 1. Make Yes button bigger
            yesScale += 0.2; 
            yesBtn.style.transform = `scale(${yesScale})`;
            
            // 2. Change No button text
            const index = Math.min(noClickCount, noTexts.length - 1);
            noBtn.innerText = noTexts[index];
        }

        // Function to make the No button run away (optional fun)
        function moveNo() {
            // Only start moving after the 2nd click to give her a chance to read
            if(noClickCount > 2) {
                const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
                const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
                noBtn.style.position = 'absolute';
                noBtn.style.left = `${x}px`;
                noBtn.style.top = `${y}px`;
            }
        }

        // Function when she clicks YES
        function acceptLove() {
            // 1. Play the Song
            audio.play();

            // 2. Change the Image (Optional: have a separate 'success.jpg')
           
            document.getElementById('imageDisplay').src = "ok.png"; 

            // 3. Change Text
            question.innerText = "Yay! I knew you'd say yes!\nAakhir hai to meri hi KOKO❤️";
            
            // 4. Hide Buttons
            document.querySelector('.btn-container').style.display = 'none';

            // 5. Add a simple confetti effect (optional visual flare)
            document.body.style.backgroundColor = "#ffc1e3";
        }
    </script>

</body>
</html>
